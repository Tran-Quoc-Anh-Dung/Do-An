<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>POS Văn Phòng Phẩm</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      margin: 0;
    }

    header {
      background: #2c3e50;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .container {
      display: flex;
    }

    .products {
      width: 70%;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
    }

    .card {
      background: white;
      padding: 10px;
      border-radius: 8px;
      text-align: center;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100px;
      height: 100px;
      object-fit: cover;
    }

    .card button {
      background: green;
      color: white;
      border: none;
      padding: 8px;
      cursor: pointer;
      margin-top: 5px;
    }

    .cart {
      width: 30%;
      background: #ecf0f1;
      padding: 15px;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .total {
      font-weight: bold;
      margin-top: 10px;
    }

    .checkout {
      background: red;
      color: white;
      padding: 10px;
      width: 100%;
      border: none;
      margin-top: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>
  <h1>🛒 POS Cửa hàng Văn Phòng Phẩm</h1>
</header>

<div class="container">

  <!-- DANH SÁCH SẢN PHẨM -->
  <div class="products" id="productList"></div>

  <!-- GIỎ HÀNG -->
  <div class="cart">
    <h3>🧾 Giỏ hàng</h3>
    <div id="cartList"></div>
    <div class="total">Tổng: <span id="total">0</span>đ</div>
    <button class="checkout" onclick="checkout()">Thanh toán</button>
  </div>

</div>

<script>
let cart = [];

// LOAD SẢN PHẨM TỪ SERVER
fetch("https://do-an-o44d.onrender.com/products")
  .then(res => res.json())
  .then(data => {
    let html = "";
    data.forEach(p => {
      html += `
        <div class="card">
          <img src="https://via.placeholder.com/100" />
          <h4>${p.name}</h4>
          <p>${p.price}đ</p>
          <button onclick="addToCart('${p.name}', ${p.price})">Mua</button>
        </div>
      `;
    });
    document.getElementById("productList").innerHTML = html;
  });

// THÊM VÀO GIỎ
function addToCart(name, price) {
  cart.push({ name, price });
  renderCart();
}

// HIỂN THỊ GIỎ
function renderCart() {
  let html = "";
  let total = 0;

  cart.forEach(item => {
    total += item.price;
    html += `
      <div class="cart-item">
        <span>${item.name}</span>
        <span>${item.price}đ</span>
      </div>
    `;
  });

  document.getElementById("cartList").innerHTML = html;
  document.getElementById("total").innerText = total;
}

// THANH TOÁN
function checkout() {
  if (cart.length === 0) {
    alert("Giỏ hàng trống!");
    return;
  }

fetch("https://pos-api.onrender.com/orders", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({ cart })
})
  .then(res => res.text())
  .then(data => {
    alert("Thanh toán thành công!");
    cart = [];
    renderCart();
  });
}
</script>

</body>
</html>

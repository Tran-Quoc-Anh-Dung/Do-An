<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POS Văn Phòng Phẩm</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --surface: #ffffff;
      --text: #2e3a45;
      --muted: #69707d;
      --primary: #2f80ed;
      --secondary: #27ae60;
      --danger: #eb5757;
      --border: #dfe3eb;
      --shadow: 0 10px 30px rgba(46, 49, 68, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: linear-gradient(135deg, #1d4ed8, #2563eb);
      color: white;
      padding: 24px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
    }

    header .top-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    header .top-actions span {
      background: rgba(255,255,255,0.16);
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 14px;
    }

    .main {
      display: grid;
      grid-template-columns: 1.8fr 1fr;
      gap: 24px;
      padding: 24px;
      max-width: 1400px;
      margin: auto;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr 200px;
      gap: 16px;
      margin-bottom: 20px;
    }

    .search-row input,
    .search-row select {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      font-size: 15px;
      color: var(--text);
      background: #f8fafc;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    .product-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 24px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 320px;
    }

    .product-card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 18px;
      margin-bottom: 16px;
    }

    .product-card h3 {
      margin: 0 0 8px;
      font-size: 18px;
    }

    .product-card p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    .product-card .price {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text);
    }

    .product-card button {
      border: none;
      border-radius: 14px;
      background: var(--primary);
      color: white;
      padding: 12px 16px;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.15s ease;
    }

    .product-card button:hover {
      transform: translateY(-1px);
    }

    .cart-summary {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .cart-box {
      padding: 20px;
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      background: #fbfdff;
    }

    .cart-box h3 {
      margin-top: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .cart-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid #e5e7eb;
    }

    .cart-item:last-child {
      border-bottom: none;
    }

    .cart-item div {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .cart-item .item-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .cart-item button {
      border: 1px solid var(--border);
      background: white;
      border-radius: 12px;
      width: 34px;
      height: 34px;
      cursor: pointer;
      color: var(--text);
      font-size: 18px;
    }

    .summary-line {
      display: flex;
      justify-content: space-between;
      margin: 12px 0;
      color: var(--muted);
    }

    .summary-line.total {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }

    .primary-btn,
    .secondary-btn {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 14px 18px;
      font-size: 16px;
      cursor: pointer;
      font-weight: 700;
    }

    .primary-btn {
      background: var(--secondary);
      color: white;
    }

    .secondary-btn {
      background: #f4f5f7;
      color: var(--text);
    }

    .invoice {
      padding: 20px;
      border-radius: 20px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
    }

    .invoice header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .invoice header h4 {
      margin: 0;
    }

    .invoice-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 16px;
    }

    .invoice-table th,
    .invoice-table td {
      padding: 10px 8px;
      border-bottom: 1px solid #eef1f5;
      text-align: left;
    }

    .invoice-table th {
      color: var(--muted);
      font-weight: 600;
      font-size: 14px;
    }

    .invoice-empty {
      text-align: center;
      padding: 30px 0;
      color: var(--muted);
    }

    @media (max-width: 1100px) {
      .main {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<header>
  <h1>POS Văn Phòng Phẩm</h1>
  <div class="top-actions">
    <span>Giao diện bán hàng chuyên nghiệp</span>
    <span>Quản lý giỏ hàng & hóa đơn</span>
  </div>
</header>

<section class="main">
  <div class="panel">
    <div class="search-row">
      <input id="searchInput" type="text" placeholder="Tìm kiếm sản phẩm, mã SP..." oninput="filterProducts()">
      <select id="categorySelect" onchange="filterProducts()">
        <option value="all">Tất cả danh mục</option>
      </select>
    </div>

    <div class="products-grid" id="productList">
      <div class="invoice-empty">Đang tải sản phẩm...</div>
    </div>
  </div>

  <div class="cart-summary">
    <div class="cart-box">
      <h3>Giỏ hàng</h3>
      <div id="cartList">
        <div class="invoice-empty">Chưa có sản phẩm nào trong giỏ.</div>
      </div>
      <div class="summary-line total">
        <span>Tổng đơn hàng</span>
        <span id="cartTotal">0đ</span>
      </div>
      <button class="primary-btn" onclick="checkout()">Thanh toán</button>
      <button class="secondary-btn" onclick="resetCart()">Xóa giỏ hàng</button>
    </div>

    <div class="invoice" id="invoiceBox">
      <header>
        <div>
          <h4>Hóa đơn bán hàng</h4>
          <div id="invoiceMeta">Chưa có hóa đơn</div>
        </div>
      </header>
      <table class="invoice-table" id="invoiceTable">
        <thead>
          <tr>
            <th>Sản phẩm</th>
            <th>SL</th>
            <th>Đơn giá</th>
            <th>Thành tiền</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <div class="summary-line total">
        <span>Tổng thanh toán</span>
        <span id="invoiceTotal">0đ</span>
      </div>
    </div>
  </div>
</section>

<script>
  let products = [];
  let cart = [];

  const formatCurrency = value => value.toLocaleString('vi-VN') + ' đ';

  async function loadProducts() {
    try {
      const response = await fetch('/products');
      products = await response.json();
      renderProducts(products);
      populateCategoryFilter(products);
    } catch (error) {
      document.getElementById('productList').innerHTML = '<div class="invoice-empty">Không thể tải sản phẩm.</div>';
      console.error('Load products error:', error);
    }
  }

  function populateCategoryFilter(items) {
    const categorySelect = document.getElementById('categorySelect');
    const categories = ['all', ...new Set(items.map(item => item.category || 'Khác'))];
    categorySelect.innerHTML = categories.map(cat => `\n      <option value="${cat}">${cat === 'all' ? 'Tất cả danh mục' : cat}</option>\n    `).join('');
  }

  function renderProducts(items) {
    const html = items.length === 0
      ? '<div class="invoice-empty">Không tìm thấy sản phẩm.</div>'
      : items.map(product => `\n        <div class="product-card">\n          <img src="${product.image || 'https://images.unsplash.com/photo-1515879218367-8466d910aaa4?auto=format&fit=crop&w=600&q=80'}" alt="${product.name}">\n          <div>\n            <h3>${product.name}</h3>\n            <p>${product.description || 'Văn phòng phẩm chất lượng, giá tốt.'}</p>\n          </div>\n          <div class="price">${formatCurrency(product.price)}</div>\n          <button onclick="addToCart(${product.id})">Thêm vào giỏ</button>\n        </div>\n      `).join('');

    document.getElementById('productList').innerHTML = html;
  }

  function filterProducts() {
    const query = document.getElementById('searchInput').value.trim().toLowerCase();
    const category = document.getElementById('categorySelect').value;

    const filtered = products.filter(product => {
      const matchesName = product.name.toLowerCase().includes(query) || (product.code || '').toLowerCase().includes(query);
      const matchesCategory = category === 'all' || (product.category || 'Khác') === category;
      return matchesName && matchesCategory;
    });

    renderProducts(filtered);
  }

  function addToCart(productId) {
    const product = products.find(item => item.id === productId);
    if (!product) return;

    const existing = cart.find(item => item.id === productId);
    if (existing) {
      existing.quantity += 1;
    } else {
      cart.push({ ...product, quantity: 1 });
    }

    renderCart();
  }

  function updateQuantity(id, delta) {
    const item = cart.find(row => row.id === id);
    if (!item) return;
    item.quantity += delta;
    if (item.quantity <= 0) {
      cart = cart.filter(row => row.id !== id);
    }
    renderCart();
  }

  function removeItem(id) {
    cart = cart.filter(row => row.id !== id);
    renderCart();
  }

  function renderCart() {
    const cartList = document.getElementById('cartList');
    const invoiceTableBody = document.querySelector('#invoiceTable tbody');
    const cartTotalEl = document.getElementById('cartTotal');
    const invoiceTotalEl = document.getElementById('invoiceTotal');
    const invoiceMeta = document.getElementById('invoiceMeta');

    if (cart.length === 0) {
      cartList.innerHTML = '<div class="invoice-empty">Chưa có sản phẩm nào trong giỏ.</div>';
      invoiceTableBody.innerHTML = '<tr><td colspan="4" class="invoice-empty">Hóa đơn sẽ hiển thị khi bạn thêm sản phẩm.</td></tr>';
      cartTotalEl.textContent = '0đ';
      invoiceTotalEl.textContent = '0đ';
      invoiceMeta.textContent = 'Chưa có hóa đơn';
      return;
    }

    let total = 0;
    cartList.innerHTML = cart.map(item => {
      const subtotal = item.price * item.quantity;
      total += subtotal;
      return `\n        <div class="cart-item">\n          <div>\n            <strong>${item.name}</strong>\n            <span>${formatCurrency(item.price)} x ${item.quantity}</span>\n          </div>\n          <div class="item-actions">\n            <button onclick="updateQuantity(${item.id}, -1)">-</button>\n            <button onclick="updateQuantity(${item.id}, 1)">+</button>\n            <button onclick="removeItem(${item.id})">×</button>\n          </div>\n        </div>\n      `;
    }).join('');

    invoiceTableBody.innerHTML = cart.map(item => {
      const subtotal = item.price * item.quantity;
      return `\n        <tr>\n          <td>${item.name}</td>\n          <td>${item.quantity}</td>\n          <td>${formatCurrency(item.price)}</td>\n          <td>${formatCurrency(subtotal)}</td>\n        </tr>\n      `;
    }).join('');

    cartTotalEl.textContent = formatCurrency(total);
    invoiceTotalEl.textContent = formatCurrency(total);
    invoiceMeta.textContent = `Tạo: ${new Date().toLocaleString('vi-VN')}`;
  }

  function resetCart() {
    cart = [];
    renderCart();
  }

  async function checkout() {
    if (cart.length === 0) {
      alert('Vui lòng thêm sản phẩm vào giỏ hàng trước khi thanh toán.');
      return;
    }

    const order = cart.map(item => ({ product_id: item.id, product_name: item.name, price: item.price, quantity: item.quantity }));

    try {
      const response = await fetch('/orders', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cart: order })
      });
      if (!response.ok) {
        throw new Error('Lỗi khi ghi đơn hàng');
      }
      const result = await response.text();
      alert('Thanh toán thành công!\n' + result);
      resetCart();
    } catch (error) {
      console.error(error);
      alert('Có lỗi xảy ra khi thanh toán. Vui lòng thử lại.');
    }
  }

  loadProducts();
</script>
</body>
</html>

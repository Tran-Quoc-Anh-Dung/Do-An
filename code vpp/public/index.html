<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POS Văn Phòng Phẩm - Quản lý cửa hàng</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --surface: #ffffff;
      --card: #f7f9fd;
      --text: #111827;
      --muted: #4b5563;
      --primary: #2563eb;
      --secondary: #10b981;
      --danger: #ef4444;
      --border: #d1d5db;
      --shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(180deg, #eef2ff 0%, #f8fafc 100%); color: var(--text); }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }

    header { display: flex; justify-content: space-between; align-items: center; gap: 16px; padding: 24px 32px; background: rgba(37, 99, 235, 0.98); color: white; position: sticky; top: 0; z-index: 10; }
    header h1 { margin: 0; font-size: 24px; font-weight: 900; letter-spacing: -0.03em; }
    header .meta { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    header .meta span, header .meta button { background: rgba(255,255,255,0.16); border-radius: 999px; padding: 10px 16px; color: white; border: none; }

    .page { max-width: 1400px; margin: 24px auto; padding: 0 24px; display: grid; gap: 24px; }
    .card { background: var(--surface); border: 1px solid rgba(209,213,219,0.6); border-radius: 24px; box-shadow: 0 30px 90px rgba(15,23,42,0.08); padding: 28px; }
    h1, h2, h3, h4 { margin-top: 0; font-weight: 900; text-transform: none; letter-spacing: 0.02em; color: #111827; }
    .card h2 { font-size: 24px; }
    .card h3 { font-size: 18px; }
    .tabs .tab-button { font-weight: 700; text-transform: none; letter-spacing: 0.02em; }
    .small-card { border-radius: 26px; background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(248,250,252,0.95)); padding: 24px; display: grid; gap: 12px; border: 1px solid rgba(203,213,225,0.8); }
    .small-card span { color: #64748b; font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em; }
    .small-card strong { display: block; font-size: 34px; color: #1e3a8a; }
    .chart-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 20px; margin-bottom: 20px; }
    .chart-card { background: var(--card); border: 1px solid rgba(209,213,219,0.75); border-radius: 24px; padding: 22px; }
    .chart-card h3 { margin-bottom: 16px; }
    .chart-header { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 14px; }
    .chart-header span { color: var(--muted); font-size: 14px; }
    .bar-chart { display: flex; align-items: flex-end; gap: 12px; height: 220px; padding-bottom: 16px; border-bottom: 1px solid rgba(148,163,184,0.35); }
    .bar-chart .bar { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 10px; min-width: 0; height: 100%; }
    .bar-chart .bar span { display: block; width: 100%; border-radius: 16px 16px 0 0; background: linear-gradient(180deg, rgba(59,130,246,0.92), rgba(37,99,235,1)); height: var(--bar-height, 20%); transition: height 0.32s ease; box-shadow: inset 0 6px 12px rgba(255,255,255,0.16); }
    .bar-chart .bar .bar-value { font-size: 12px; color: var(--text); font-weight: 700; line-height: 1.2; }
    .bar-chart .bar label { font-size: 12px; color: var(--muted); text-align: center; white-space: nowrap; }
    .report-metrics { display: grid; grid-template-columns: repeat(4, minmax(180px, 1fr)); gap: 20px; margin-bottom: 20px; }
    .report-metrics .small-card { border-radius: 24px; padding: 22px; }
    .report-table-card { margin-top: 20px; }
    .report-table-card h3 { margin-bottom: 16px; }
    .table-compact th, .table-compact td { padding: 12px 14px; }
    .table-compact tbody tr:hover { background: rgba(37,99,235,0.04); }
    .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 20px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 20px; }
    .hidden { display: none !important; }
    .button { border: none; border-radius: 16px; padding: 14px 24px; background: linear-gradient(135deg, var(--primary), #1d4ed8); color: white; font-weight: 800; letter-spacing: 0.01em; box-shadow: 0 18px 35px rgba(37,99,235,0.25); transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease; }
    .button:hover { transform: translateY(-2px); box-shadow: 0 22px 40px rgba(37,99,235,0.28); }
    .button-outline { background: transparent; color: var(--text); border: 1px solid rgba(148,163,184,0.8); }
